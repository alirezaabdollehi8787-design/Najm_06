  try {
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const DOC_REF = db.collection("najm").doc("data");

    window.fbGetData = async function() {
      const snap = await DOC_REF.get();
      return snap.exists ? snap.data() : null;
    };
    window.fbSaveData = async function(data) {
      await DOC_REF.set(data);
    };
    window.fbListen = function(callback) {
      DOC_REF.onSnapshot(snap => {
        if (snap.exists) callback(snap.data());
      });
    };
    window.fbReady = true;
    console.log('Firebase آماده است');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e1a;--card:#111827;--inp:#1a2332;--border:#1e3a5f;
  --accent:#00d4ff;--blue:#0066cc;--muted:#94a3b8;--dim:#64748b;
  --green:#059669;--red:#dc2626;--yellow:#d97706;--purple:#7c3aed;
}
body{font-family:'Vazirmatn',sans-serif;background:var(--bg);color:#e0e0e0;min-height:100vh}

/* ── UTILS ── */
.hidden{display:none!important}
.flex{display:flex;align-items:center}
.gap8{gap:8px}.gap12{gap:12px}
.center{text-align:center}
input,select,textarea{

  color:#fff;font-family:'Vazirmatn',sans-serif;font-size:13px;
  padding:10px 14px;width:100%;outline:none;transition:border-color .2s
}
input:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
textarea{resize:vertical;min-height:75px}
label{display:block;margin-bottom:5px;color:var(--muted);font-size:13px;font-weight:500}
.fg{margin-bottom:14px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}

/* ── BUTTON ── */
.btn{

}
.btn-sm{padding:5px 12px;font-size:12px}
.b-blue{background:var(--blue);color:#fff}.b-blue:hover{background:#0077e6}
.b-green{background:var(--green);color:#fff}.b-green:hover{background:#10b981}
.b-red{background:var(--red);color:#fff}.b-red:hover{background:#ef4444}
.b-yellow{background:var(--yellow);color:#fff}
.b-purple{background:var(--purple);color:#fff}.b-purple:hover{background:#8b5cf6}
.b-out{background:transparent;border:1px solid var(--blue);color:var(--accent)}

/* ── BADGE ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.bg-green{background:var(--green);color:#fff}
.bg-blue{background:var(--blue);color:#fff}
.bg-gray{background:#475569;color:#fff}
.bg-purple{background:var(--purple);color:#fff}
.bg-teal{background:#0891b2;color:#fff}

/* ── LOGIN ── */

.login-box{

.login-box h1{text-align:center;font-size:26px;font-weight:800;color:#fff;margin-bottom:3px}
.login-box p{text-align:center;color:var(--accent);font-size:13px;margin-bottom:28px;opacity:.85}
.btn-login{

}
.btn-login:hover{background:#0077e6;box-shadow:0 0 20px rgba(0,102,204,.4)}
.err{color:#f87171;text-align:center;font-size:13px;margin-top:10px;display:none}

/* ── HEADER ── */

.hdr{

.hdr-sub{font-size:11px;color:var(--dim)}

/* ── MAIN ── */
.main{padding:22px;max-width:1100px;margin:0 auto}

/* ── STAT CARD ── */

.tab.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tab:hover:not(.on){border-color:var(--accent);color:var(--accent)}
.pane{display:none}.pane.on{display:block}

/* ── TOGGLE ── */
.toggle{display:flex;gap:8px;margin-bottom:14px}
.tog{

.tog.on{background:var(--blue);color:#fff;border-color:var(--blue)}
.tog:hover:not(.on){border-color:var(--accent);color:var(--accent)}
.panel{display:none;background:var(--inp);border-radius:10px;padding:16px;margin-bottom:14px;max-height:260px;overflow-y:auto}
.panel.on{display:block}
.panel-border-blue{border-right:3px solid var(--accent)}
.panel-border-yellow{border-right:3px solid var(--yellow)}

.r-item{padding:10px 13px;background:var(--card);border-radius:8px;margin-bottom:7px;font-size:13px;border-right:2px solid var(--yellow)}
.pv-item{padding:10px 13px;background:var(--card);border-radius:8px;margin-bottom:7px}
.pv-sender{color:var(--purple);font-weight:600;font-size:12px}
.pv-time{color:var(--dim);font-size:11px}
.empty{color:var(--dim);font-size:12px;text-align:center;padding:16px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{background:var(--inp);color:var(--accent);font-weight:600;font-size:13px;padding:11px 13px;text-align:right;border-bottom:2px solid var(--blue)}
.tbl td{padding:9px 13px;border-bottom:1px solid var(--border);font-size:13px}

.h-desc{font-size:13px;flex:1;padding:0 10px}
.h-meta{color:var(--dim);font-size:11px;text-align:left;min-width:110px}

/* ── GROUP HEADER ── */
.g-head{background:var(--inp);padding:10px 16px;border-radius:9px;font-weight:600;font-size:14px;color:var(--accent);margin-bottom:10px;border-right:4px solid var(--blue);margin-top:4px}

/* ── RANK ITEM ── */

/* ── SEARCH ── */
.search-row{display:flex;gap:9px;margin-bottom:14px;flex-wrap:wrap}
.search-row input{flex:1;min-width:150px}
.search-row select{min-width:110px;width:auto}

/* ── CHART ── */
.chart-wrap{background:var(--inp);border-radius:10px;padding:16px;margin-bottom:14px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
.overlay.on{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;width:90%;max-width:480px;max-height:82vh;overflow-y:auto}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;padding-bottom:13px;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700;color:var(--accent)}
.modal-x{background:none;border:none;color:var(--dim);font-size:22px;cursor:pointer}
.modal-x:hover{color:#ef4444}

/* ── TOAST ── */
.toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);padding:12px 26px;border-radius:9px;font-size:13px;font-weight:600;z-index:300;display:none}
.toast.ok{background:var(--green);color:#fff}
.toast.er{background:var(--red);color:#fff}

/* ── CHIEF BADGE ── */
.chief-badge{display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#7c3aed,#0891b2);padding:4px 14px;border-radius:20px;font-size:12px;color:#fff;font-weight:700}

/* ── PROFILE ROW ── */
.profile-name{font-size:24px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px}
.profile-sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:14px}
.info-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.info-chip{display:flex;align-items:center;gap:5px;font-size:13px;color:var(--muted)}
.info-chip span{color:#fff;font-weight:600}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#2d4a6f;border-radius:3px}

@media(max-width:700px){
  .g2,.g3{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .score-num{font-size:64px}
  .main{padding:14px}
  .hdr{padding:10px 14px}
}
</style>
</head>

// ════════════════════════════════════════
//  بارگذاری اولیه — ابتدا تلاش با Firebase، در غیر این صورت localStorage
// ════════════════════════════════════════
async function loadD(){
  // به ماژول Firebase کمی فرصت بده تا لود شود (حداکثر ۱.۵ ثانیه)
  for(let i=0; i<15 && !window.fbReady; i++){
    await new Promise(r=>setTimeout(r,100));
  }

  if (window.fbReady) {
    try{
      const remote = await window.fbGetData();
      if (remote) {
        D = remote;
        useFirebase = true;
      } else {
        // سند هنوز روی سرور نیست → داده پیش‌فرض را اول‌بار آپلود کن
        D = JSON.parse(JSON.stringify(DEF));
        await window.fbSaveData(D);
        useFirebase = true;
      }
      // گوش‌دادن به تغییرات زنده از سایر کاربران
      window.fbListen((remoteData)=>{
        isApplyingRemote = true;
        D = remoteData;
        normalizeD();
        // اگر کاربر لاگین است، رفرنس او را در داده تازه پیدا کن و صفحه را آپدیت کن
        if (U && R) {
          const maps={student:'students',teacher:'teachers',chief:'chiefs',admin:'admins'};
          const fresh = (D[maps[R]]||[]).find(x=>x.id===U.id);
          if (fresh) { U = fresh; render(); }
          else { doLogout(); toast('حساب شما حذف شده است','er'); }
        }
        isApplyingRemote = false;
      });
      normalizeD();
      return;
    }catch(e){
      console.warn('Firebase در دسترس نیست، استفاده از حافظه محلی:', e);
      useFirebase = false;
    }
  }

  // fallback: localStorage
  try{
    const s = localStorage.getItem(KEY);
    D = s ? JSON.parse(s) : null;
    if(!D){ D = JSON.parse(JSON.stringify(DEF)); saveD(); return; }
    normalizeD();
  }catch(e){ D = JSON.parse(JSON.stringify(DEF)); }
}

function normalizeD(){
  ['students','teachers','chiefs','admins','scoreLog','tScoreLog','notices','reminders','pvs']
    .forEach(k=>{ if(!D[k]) D[k]=DEF[k]||[]; });
}

function saveD(){
  // همیشه یک نسخه پشتیبان محلی هم نگه می‌داریم
  localStorage.setItem(KEY, JSON.stringify(D));

  if (useFirebase && !isApplyingRemote) {
    window.fbSaveData(D).then(()=>{
      flashSaveIndicator('✅ ذخیره و همگام‌سازی شد');
    }).catch(err=>{
      console.error('خطا در ذخیره روی سرور:', err);
      flashSaveIndicator('⚠️ فقط محلی ذخیره شد', true);
    });
  } else {
    flashSaveIndicator('✅ ذخیره شد (محلی)');
  }
}

function flashSaveIndicator(msg, isWarn){
  const btn=document.querySelector('.btn.b-green.btn-sm');
  if(btn){
    btn.textContent=msg;
    setTimeout(()=>btn.textContent='💾 ذخیره فایل',1800);
  }
}

function doLogin(){
  const u=v('lUser'), p=v('lPass'), r=v('lRole');
  if(!u||!p){ showErr('lErr','فیلدها را پر کنید'); return; }
  const maps={student:'students',teacher:'teachers',chief:'chiefs',admin:'admins'};
  const found=(D[maps[r]]||[]).find(x=>x.u===u&&x.p===p);
  if(!found){ showErr('lErr','نام کاربری یا رمز اشتباه است'); return; }
  U=found; R=r;
  el('lErr').style.display='none';
  el('loginPage').style.display='none';
  el('appWrap').style.display='block';
  el('hdrUser').textContent=U.name+' ('+roleName()+')';
  render();
  toast('خوش آمدید '+U.name,'ok');
}
function doLogout(){
  U=null;R=null;
  Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}});
  Object.keys(charts).forEach(k=>delete charts[k]);
  el('appWrap').style.display='none';
  el('loginPage').style.display='flex';
  el('lUser').value='';el('lPass').value='';
}
function roleName(){
  return {student:'متربی',teacher:U?.type||'مربی',chief:'مربی کل',admin:'ادمین'}[R]||'';
}

function calcRank(sid, mode){
  const me = D.students.find(s=>s.id===sid);
  let pool = mode==='group'
    ? D.students.filter(s=>s.gt===me.gt&&(me.gt==='حوزه'?s.hz===me.hz:s.dr===me.dr))
    : D.students;
  return pool.sort((a,b)=>b.score-a.score).findIndex(s=>s.id===sid)+1;
}

  const notices=D.notices.filter(n=>n.to==='all'||n.to==='students');

function renderStudentRankChart(){
  const top=[...D.students].sort((a,b)=>b.score-a.score).slice(0,8);
  mkChart('cRank','bar',{

      backgroundColor:top.map(s=>s.id===U.id?'rgba(0,212,255,.85)':'rgba(0,102,204,.5)'),

function renderStudentProgressChart(){
  const h=D.scoreLog.filter(l=>l.sid===U.id).sort((a,b)=>a.date.localeCompare(b.date));
  if(!h.length) return;
  let run=0;const pts=h.map(l=>{run+=l.val;return{d:l.date,v:run}});
  mkChart('cProg','line',{
    labels:pts.map(p=>p.d),
    datasets:[{label:'امتیاز تجمعی',data:pts.map(p=>p.v),
      borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,.08)',
      borderWidth:2,fill:true,tension:.4,pointRadius:4,pointBackgroundColor:'#00d4ff'}]
  });
}

function allStaffById(id){
  return D.teachers.find(x=>x.id===id) || D.chiefs.find(x=>x.id===id);
}
function renderTScoreRank(rankId){
  const c=el(rankId); if(!c) return;
  const all=[...D.teachers,...D.chiefs].sort((a,b)=>(b.score||0)-(a.score||0));
  const cls=['rk1','rk2','rk3'];
  c.innerHTML=all.map((t,i)=>`
    <div class="rank-item" ${t.id===U.id?'style="border:1px solid var(--accent)"':''}>
      <div class="flex gap12">
        <span class="rank-n ${cls[i]||'rk-'}">${i+1}</span>
        <div>
          <strong>${t.name}</strong>
          <span class="badge ${t.type==='مسئول مقطع'?'bg-purple':t.type==='مربی'?'bg-teal':'bg-gold'}" style="margin-right:6px">${t.type||'مربی کل'}</span>
          ${t.id===U.id?'<span class="badge bg-green">شما</span>':''}
        </div>
      </div>
      <strong style="color:var(--accent);font-size:18px">${t.score||0}</strong>
    </div>`).join('');
}
function renderTScoreChart(chartId){
  const all=[...D.teachers,...D.chiefs].sort((a,b)=>(b.score||0)-(a.score||0));
  const colors=['rgba(124,58,237,.8)','rgba(0,102,204,.7)','rgba(8,145,178,.7)','rgba(5,150,105,.7)','rgba(217,119,6,.7)','rgba(220,38,38,.7)'];
  mkChart(chartId,'bar',{
    labels:all.map(t=>t.name),
    datasets:[{label:'امتیاز',data:all.map(t=>t.score||0),
      backgroundColor:all.map((_,i)=>colors[i%colors.length]),
      borderWidth:2,borderRadius:6}]
  },{plugins:{legend:{display:false}}});
}
function submitTScore(selId,valId,descId,rankId,chartId){
  const tid=v(selId), val=parseInt(v(valId)), desc=v(descId)||'توسط '+U.name;
  if(!tid||isNaN(val)){toast('مقدار صحیح وارد کنید','er');return;}
  const t=allStaffById(tid);
  if(!t){toast('مربی یافت نشد','er');return;}
  t.score=(t.score||0)+val;
  D.tScoreLog.push({id:'ts'+Date.now(),tid,val,desc,date:nowDate(),by:U.id});
  saveD();
  el(valId).value=''; el(descId).value='';
  renderTScoreRank(rankId);
  renderTScoreChart(chartId);
  if(R==='chief') renderChiefStats();
  toast('امتیاز مربی ثبت شد','ok');
}

function submitChiefTScore(){
  submitTScore('chiefTSelect','chiefTVal','chiefTDesc','chiefTRank','cTeacher');
}

function renderScoreStudents(gId,hId,dId,sId,cId){
  const gt=v(gId), hz=v(hId), dr=v(dId), q=v(sId).toLowerCase();
  const rows=D.students.filter(s=>(!gt||s.gt===gt)&&(!hz||s.hz===hz)&&(!dr||s.dr===dr)&&(!q||s.name.includes(q)||s.u.includes(q)));
  const c=el(cId);
  if(!rows.length){c.innerHTML='<div class="empty">متربی‌ای یافت نشد</div>';return;}

  // group
  const grps={};
  rows.forEach(s=>{const k=s.gt==='حوزه'?s.hz:s.dr;(grps[k]=grps[k]||[]).push(s);});

  c.innerHTML=Object.entries(grps).map(([g,list])=>`
    <div class="g-head">${g}</div>
    <table class="tbl" style="margin-bottom:16px">
      <thead><tr><th>نام</th><th>نوع</th><th>امتیاز</th><th>رتبه گروه</th><th>عملیات</th></tr></thead>
      <tbody>${list.map(s=>`<tr>
        <td>${s.name}</td>
        <td><span class="badge ${typeBadge(s.type)}">${s.type}</span></td>
        <td><strong style="color:var(--accent)">${s.score}</strong></td>
        <td>${calcRank(s.id,'group')}</td>
        <td>
          <button class="btn b-green btn-sm" onclick="scoreModal('${s.id}',1)">+ امتیاز</button>
          <button class="btn b-red btn-sm" onclick="scoreModal('${s.id}',-1)">- کسر</button>
        </td>
      </tr>`).join('')}</tbody>
    </table>`).join('');
}

function openM(html){ el('modal').innerHTML=html; el('overlay').classList.add('on'); }

function scoreModal(sid,mul){
  const s=D.students.find(x=>x.id===sid);
  openM(`<div class="modal-hdr">
    <div class="modal-title">${mul>0?'افزایش':'کسر'} امتیاز — ${s.name}</div>

  <div class="fg"><label>توضیحات</label><textarea id="mDesc" placeholder="توضیح..."></textarea></div>
  <button class="btn ${mul>0?'b-green':'b-red'}" onclick="doScore('${sid}',${mul})">ثبت</button>`);
}
function doScore(sid,mul){
  const val=parseInt(v('mVal')), desc=v('mDesc')||'بدون توضیح';
  if(!val||val<=0){toast('عدد صحیح وارد کنید','er');return;}
  const s=D.students.find(x=>x.id===sid);
  s.score+=val*mul;
  D.scoreLog.push({id:'l'+Date.now(),sid,val:val*mul,desc,date:nowDate(),by:U.id});
  saveD(); closeM();
  if(R==='teacher') renderScoreStudents('tGrp','tHz','tDr','tSearch','tStudentList');
  if(R==='chief'){ renderScoreStudents('chGrp','chHz','chDr','chSearch','chStudentList'); renderChiefStats(); }
  toast('امتیاز ثبت شد','ok');
}

    <div class="fg"><label>تاریخ تولد</label><input id="mSBd" value="${s.bd}"></div>
  </div>
  <div class="row2">
    <div class="fg"><label>نوع گروه</label>
      <select id="mSGt" onchange="updGSel('mSGt','mSGLabel','mSG')">
        <option ${s.gt==='حوزه'?'selected':''}>حوزه</option>
        <option ${s.gt==='دوره'?'selected':''}>دوره</option>
      </select>
    </div>
    <div class="fg"><label id="mSGLabel">${s.gt==='حوزه'?'حوزه':'دوره'}</label>
      <select id="mSG">${s.gt==='حوزه'?hzOpts(s.hz):drOpts(s.dr)}</select>
    </div>
  </div>
  <div class="row2">
    <div class="fg"><label>نوع عضویت</label>
      <select id="mSType">
        <option ${s.type==='فعال'?'selected':''}>فعال</option>
        <option ${s.type==='ساده'?'selected':''}>ساده</option>
        <option ${s.type==='مهمان'?'selected':''}>مهمان</option>
      </select>
    </div>
    <div class="fg"><label>امتیاز</label><input type="number" id="mSSc" value="${s.score}"></div>
  </div>
  <button class="btn b-blue" onclick="saveStudent('${id}')">ذخیره</button>`);
}
function saveStudent(id){
  const s=D.students.find(x=>x.id===id);
  const nu=v('mSU');
  if(nu!==s.u&&D.students.find(x=>x.u===nu)){toast('نام کاربری تکراری است','er');return;}
  const gt=v('mSGt'),g=v('mSG');
  Object.assign(s,{name:v('mSName'),u:nu,p:v('mSP'),bd:v('mSBd'),gt,hz:gt==='حوزه'?g:'',dr:gt==='دوره'?g:'',type:v('mSType'),score:parseInt(v('mSSc'))||0});
  saveD(); closeM(); renderAdminStudents();
  el('aStSc').textContent=D.students.reduce((s,x)=>s+x.score,0);
  toast('تغییرات ذخیره شد','ok');
}
function delStudent(id){
  if(!confirm('آیا مطمئن هستید؟')) return;
  D.students=D.students.filter(x=>x.id!==id);
  D.scoreLog=D.scoreLog.filter(x=>x.sid!==id);
  D.reminders=D.reminders.filter(x=>x.sid!==id);
  saveD(); renderAdminStudents();
  el('aStS').textContent=D.students.length;
  el('aStSc').textContent=D.students.reduce((s,x)=>s+x.score,0);
  toast('متربی حذف شد','ok');
}

// ════════════════════════════════════════
//  SHARED ACTIONS
// ════════════════════════════════════════
function sendPV(toId,msgId,inboxId){
  const to=v(toId), text=v(msgId).trim();
  if(!text){toast('پیام را وارد کنید','er');return;}
  D.pvs.push({id:'p'+Date.now(),from:U.id,to,text,date:nowDate()});
  saveD(); el(msgId).value=''; renderPVInbox(inboxId);
  toast('پیام ارسال شد','ok');
}
function renderPVInbox(cId){
  const msgs=D.pvs.filter(m=>m.from===U.id||m.to===U.id).sort((a,b)=>b.date.localeCompare(a.date));
  el(cId).innerHTML=pvHTML(msgs);
}
function pvHTML(msgs){
  if(!msgs.length) return '<div class="empty">پیامی وجود ندارد</div>';
  return msgs.map(m=>{
    const isSender=m.from===U.id;
    const other=isSender?findPerson(m.to):findPerson(m.from);
    return`<div class="pv-item">
      <div class="flex gap8" style="justify-content:space-between;margin-bottom:5px">
        <span class="pv-sender">${isSender?'شما':other}</span>
        <span class="pv-time">${m.date}</span>
      </div>
      <div style="font-size:13px">${m.text}</div>
    </div>`;
  }).join('');
}

function sendReminder(sidId,textId){
  const sid=v(sidId), text=v(textId).trim();
  if(!text){toast('متن یادآوری را وارد کنید','er');return;}
  D.reminders.push({id:'r'+Date.now(),sid,text,date:nowDate(),by:U.id});
  saveD(); el(textId).value='';
  toast('یادآوری ارسال شد','ok');
}

function sendNotice(titleId,textId,toId,listId,canDel){
  const title=v(titleId).trim(), text=v(textId).trim(), to=v(toId);
  if(!title||!text){toast('عنوان و متن را وارد کنید','er');return;}
  D.notices.push({id:'n'+Date.now(),title,text,to,date:nowDate(),by:U.id});
  saveD(); el(titleId).value=''; el(textId).value='';
  if(canDel) renderChiefNoticeList(); else renderAdminNotices();
  toast('اطلاعیه ارسال شد','ok');
}

function delNotice(id,listId,canDel){
  if(!confirm('آیا مطمئن هستید؟')) return;
  D.notices=D.notices.filter(x=>x.id!==id);
  saveD();
  if(canDel) renderChiefNoticeList(); else renderAdminNotices();
  toast('اطلاعیه حذف شد','ok');
}

function exportD(){
  const a=document.createElement('a');
  a.href='data:application/json,'+encodeURIComponent(JSON.stringify(D,null,2));
  a.download='najm_'+nowDate().replace(/\//g,'-')+'.json';
  a.click();
  toast('فایل دانلود شد','ok');
}
function importD(input){
  const f=input.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=e=>{
    try{
      const imp=JSON.parse(e.target.result);
      if(!imp.students||!imp.admins){toast('فایل نامعتبر است','er');return;}
      if(!imp.chiefs) imp.chiefs=DEF.chiefs;
      if(!imp.tScoreLog) imp.tScoreLog=[];
      D=imp; saveD(); render();
      toast('داده‌ها بازیابی شدند','ok');
    }catch{toast('خطا در خواندن فایل','er');}
  };
  r.readAsText(f); input.value='';
}
function resetD(){
  if(!confirm('تمام داده‌ها حذف می‌شوند. ادامه دهید؟')) return;
  D=JSON.parse(JSON.stringify(DEF)); saveD(); render();
  toast('داده‌ها ریست شدند','ok');
}

// ════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════
function el(id){return document.getElementById(id)}
function v(id){const e=el(id);return e?e.value:''}
function togPanel(onId,offId){
  el('tog'+onId).classList.add('on'); el('tog'+offId).classList.remove('on');
  el('pan'+onId).classList.add('on'); el('pan'+offId).classList.remove('on');
}
function switchTab(btn,paneId){
  const group=btn.closest('[data-tabgroup]');
  if(group){
    group.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
    group.querySelectorAll('.pane').forEach(p=>p.classList.remove('on'));
  }
  btn.classList.add('on');
  el(paneId).classList.add('on');
}
function fillSelect(id,opts){
  const s=el(id); if(!s) return;
  s.innerHTML=opts.map(o=>`<option value="${o.v}">${o.l}</option>`).join('');
}
function hzOpts(sel=''){return['حوزه ۱','حوزه ۲','حوزه ۳'].map(x=>`<option ${x===sel?'selected':''}>${x}</option>`).join('')}
function drOpts(sel=''){return['دوره ۱','دوره ۲','دوره ۳','دوره ۴'].map(x=>`<option ${x===sel?'selected':''}>${x}</option>`).join('')}
function updGSel(gtId,lblId,gId){
  const gt=v(gtId);
  el(lblId).textContent=gt==='حوزه'?'حوزه':'دوره';
  el(gId).innerHTML=gt==='حوزه'?hzOpts():drOpts();
}
function typeBadge(type){return{فعال:'bg-green',ساده:'bg-blue',مهمان:'bg-gray'}[type]||'bg-gray'}
function nowDate(){
  const d=new Date();
  return`${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
}
function findName(id){
  return (D.teachers.find(x=>x.id===id)||D.chiefs.find(x=>x.id===id)||{name:'ادمین'}).name;
}
function findPerson(id){
  return (D.teachers.find(x=>x.id===id)||D.chiefs.find(x=>x.id===id)||D.students.find(x=>x.id===id)||{name:'نامشخص'}).name;
}
function showErr(id,msg){const e=el(id);e.textContent=msg;e.style.display='block';}
function toast(msg,type){
  const t=el('toast'); t.textContent=msg; t.className='toast '+type; t.style.display='block';
  clearTimeout(t._t); t._t=setTimeout(()=>t.style.display='none',3000);
}

const chartOpts={
  plugins:{legend:{labels:{color:'#94a3b8',font:{family:'Vazirmatn'}}}},
  scales:{
    x:{ticks:{color:'#94a3b8',font:{family:'Vazirmatn'}},grid:{color:'rgba(30,58,95,.4)'}},
    y:{ticks:{color:'#94a3b8',font:{family:'Vazirmatn'}},grid:{color:'rgba(30,58,95,.4)'}}
  }
};
function mkChart(id,type,data,extra={}){
  if(charts[id]){try{charts[id].destroy()}catch(e){} delete charts[id];}
  const c=el(id); if(!c) return;
  charts[id]=new Chart(c,{type,data,options:{responsive:true,...chartOpts,...extra,plugins:{...chartOpts.plugins,...(extra.plugins||{})}}});
}

el('overlay').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM();});
['lUser','lPass'].forEach(id=>el(id).addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();}));

(async function start(){
  const loginBtn = document.querySelector('.btn-login');
  if(loginBtn){ loginBtn.disabled = true; loginBtn.textContent='در حال اتصال...'; }
  await loadD();
  if(loginBtn){ loginBtn.disabled = false; loginBtn.textContent='ورود به سامانه'; }
  // نشانه وضعیت اتصال در صفحه ورود
  const statusEl = document.createElement('p');
  statusEl.style.cssText = 'text-align:center;font-size:11px;margin-top:14px;color:' + (useFirebase ? '#10b981' : '#f59e0b');
  statusEl.textContent = useFirebase ? '🟢 متصل به سرور آنلاین (همگام‌سازی فعال)' : '🟡 حالت محلی (فقط همین دستگاه)';
  document.querySelector('.login-box')?.appendChild(statusEl);
})();
</script>
